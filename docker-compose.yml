# Migrations Django au démarrage du service « backend », pas pendant docker build (cf. docker-entrypoint.sh).
# Les identifiants PostgreSQL viennent uniquement du fichier « .env » à la racine (voir .env.example).

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Définir POSTGRES_DB dans .env}
      POSTGRES_USER: ${POSTGRES_USER:?Définir POSTGRES_USER dans .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Définir POSTGRES_PASSWORD dans .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:?Définir POSTGRES_PORT dans .env}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Dans Compose, le backend joint le service Postgres par son nom d’hôte interne.
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}

volumes:
  postgres_data:
  frontend_node_modules:
