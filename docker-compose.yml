# Les migrations Django s’exécutent au DÉMARRAGE du service « backend » (voir docker-entrypoint.sh),
# pas pendant « docker build » : la base Postgres n’est pas disponible lors de la construction d’image.
# Sur un volume Postgres neuf ou une base vide, « migrate » applique toutes les migrations (dont la 0001).

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edunova}
      POSTGRES_USER: ${POSTGRES_USER:-edunova}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edunova}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edunova}
      POSTGRES_USER: ${POSTGRES_USER:-edunova}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edunova}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}

volumes:
  postgres_data:
  frontend_node_modules:
