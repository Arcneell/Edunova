# Migrations Django au démarrage du service « backend », pas pendant docker build (cf. docker-entrypoint.sh).
# Les identifiants PostgreSQL viennent uniquement du fichier « .env » à la racine (voir .env.example).

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Dans Compose, le backend joint le service Postgres par son nom d’hôte interne.
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      # Mettre à 1 pour lancer les tests API au démarrage (bloque si échec).
      RUN_TESTS: "${RUN_TESTS:-0}"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      # Laisser vide : le frontend utilise des chemins relatifs (/api/…) que le
      # proxy Vite route vers backend:8000 (réseau interne). Les cookies de session
      # fonctionnent car tout reste sur la même origine (localhost:5173).
      VITE_API_URL: ${VITE_API_URL:-}
      # Cible du proxy Vite (/api → backend) quand le front tourne dans Compose
      VITE_API_PROXY_TARGET: http://backend:8000

volumes:
  postgres_data:
  frontend_node_modules:
